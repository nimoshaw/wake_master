<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WakeMaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1>WakeMaster</h1>
        </div>
        <p class="subtitle">局域网机器管理与一键唤醒 <span class="version-tag" id="versionTag">v0.4.0</span></p>
      </div>
      <div class="header-right">
        <div class="refresh-control">
          <label for="refreshInterval">自动刷新</label>
          <select id="refreshInterval">
            <option value="0" selected>不刷新</option>
            <option value="300">5 分钟</option>
            <option value="900">15 分钟</option>
            <option value="1800">30 分钟</option>
            <option value="3600">1 小时</option>
          </select>
        </div>
        <button class="btn btn-secondary" id="refreshBtn" title="立即刷新状态">
          <span class="btn-icon">🔄</span>
          刷新
        </button>
        <button class="btn btn-secondary" id="scanBtn" title="扫描局域网设备">
          <span class="btn-icon">📡</span>
          扫描
        </button>
        <button class="btn btn-secondary" id="settingsBtn" title="设置">
          <span class="btn-icon">⚙️</span>
        </button>
        <div class="btn-group" id="addBtnGroup">
          <button class="btn btn-primary" id="addMachineBtn" title="添加新机器">
            <span class="btn-icon">➕</span>
            添加
          </button>
          <button class="btn btn-primary btn-dropdown-toggle" id="addDropdownToggle" title="更多操作">▾</button>
          <div class="dropdown-menu" id="addDropdownMenu">
            <button class="dropdown-item" id="exportBtn">📤 导出配置</button>
            <button class="dropdown-item" id="importBtn">📥 导入配置</button>
          </div>
        </div>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
      </div>
    </div>
  </header>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-bar-content">
      <span class="status-text" id="statusText">正在检测状态...</span>
      <span class="status-time" id="lastUpdate"></span>
    </div>
  </div>

  <!-- Machine cards grid -->
  <main class="main">
    <div class="machines-grid" id="machinesGrid"></div>
  </main>

  <!-- Add/Edit Machine Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">添加机器</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="machineForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="machineName">主机名称</label>
          <input type="text" id="machineName" placeholder="例如: my-server" required>
        </div>
        <div class="form-group">
          <label for="machineMac">MAC 地址</label>
          <input type="text" id="machineMac" placeholder="支持 D8:BB:C1:9A:9D:79 / D8-BB-... / 空格分隔" required>
        </div>
        <div class="form-group">
          <label for="machineIp">IP 地址</label>
          <input type="text" id="machineIp" placeholder="例如: 192.168.0.100" required>
        </div>
        <div class="form-group">
          <label for="machineIcon">图标</label>
          <div class="icon-picker">
            <button type="button" class="icon-option selected" data-icon="🖥️">🖥️</button>
            <button type="button" class="icon-option" data-icon="💻">💻</button>
            <button type="button" class="icon-option" data-icon="📦">📦</button>
            <button type="button" class="icon-option" data-icon="🖧">🖧</button>
            <button type="button" class="icon-option" data-icon="💡">💡</button>
            <button type="button" class="icon-option" data-icon="🎮">🎮</button>
            <button type="button" class="icon-option" data-icon="📡">📡</button>
            <button type="button" class="icon-option" data-icon="🗄️">🗄️</button>
          </div>
          <input type="hidden" id="machineIcon" value="🖥️">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scan LAN Modal -->
  <div class="modal-overlay" id="scanModalOverlay">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>🔍 局域网设备扫描</h2>
        <button class="modal-close" id="scanModalClose">&times;</button>
      </div>
      <div class="scan-status" id="scanStatus">点击「开始扫描」发现局域网设备</div>
      <div class="scan-results" id="scanResults"></div>
      <div class="form-actions">
        <button class="btn btn-secondary" id="scanCloseBtn">关闭</button>
        <button class="btn btn-primary" id="startScanBtn">
          <span class="btn-icon">📡</span>
          开始扫描
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>⚙️ 设置</h2>
        <button class="modal-close" id="settingsModalClose">&times;</button>
      </div>
      <div class="settings-form">
        <div class="form-group">
          <label for="groupPassword">组密码</label>
          <input type="password" id="groupPassword" placeholder="所有机器设置相同的组密码">
          <p class="form-hint">用于 P2P 远程关机/重启认证，所有机器需使用相同密码</p>
        </div>
        <div class="form-group">
          <label class="toggle-label">
            <input type="checkbox" id="autoStartToggle">
            <span>开机自启动</span>
          </label>
          <p class="form-hint">开机后自动运行 WakeMaster，保持接收远程指令</p>
        </div>
        <div class="form-group">
          <label>P2P 状态</label>
          <p class="form-hint" id="p2pStatus">🔒 命令监听端口: 9090</p>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="settingsCancelBtn">取消</button>
          <button type="button" class="btn btn-primary" id="settingsSaveBtn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
