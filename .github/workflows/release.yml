name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows Desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        working-directory: clients/desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: |
            clients/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi

  build-android:
    runs-on: ubuntu-latest
    name: Android APK

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK (Auto-signed)
        working-directory: clients/android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon

      - name: Find and rename APK
        run: |
          APK=$(find clients/android/app/build -name "*.apk" -path "*/debug/*" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" clients/android/WakeMaster-android.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: clients/android/WakeMaster-android.apk

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WakeMaster ${{ github.ref_name }}"
          body: |
            ## ⚡ WakeMaster ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | 🖥️ Windows | `.exe` (NSIS installer) or `.msi` |
            | 📱 Android | `.apk` (允许未知来源安装) |

            ### 🐳 Docker 部署 (NAS / Linux 服务器)
            ```bash
            git clone https://github.com/nimoshaw/wake_master.git
            cd wake_master
            docker-compose up -d
            ```
            自定义端口: `PORT=8080 docker-compose up -d`

            ### 🌐 Web 版直接部署
            ```bash
            git clone https://github.com/nimoshaw/wake_master.git
            cd wake_master && npm install && npm start
            ```

            ---
            **Full changelog**: https://github.com/nimoshaw/wake_master/commits/${{ github.ref_name }}
          files: artifacts/**/*
          draft: false
          prerelease: false
